<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>野菇軍艦 | </title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Serif TC', serif;
      background: #ffffff;
      color: #0d0d0d;
      line-height: 1.7;
    }

    /*  Banner：三張圖一起 */
    .banner {
      position: relative;
      width: 100%;
      height: 80vh;
      overflow: hidden;
    }

    /*  最底層：最新圖 extra.png */
    .banner-img-extra {
      position: absolute;
      width: 80%;
      left: 45%;
      top: 70%;
      transform: translate(-50%, -50%);
      z-index: 0;

      opacity: 0;
      animation: fadeExtra 1.8s ease forwards;
      animation-delay: 0.2s;
    }

    /*  中層：new.png */
    .banner-img-bottom {
      position: absolute;
      width: 130%;
      left: 55%;
      top: 65%;
      transform: translate(-50%, -50%);
      z-index: 1;

      opacity: 0;
      animation: fadeBottom 1.8s ease forwards;
      animation-delay: 0.4s;
    }

    /*  最上層：舊圖 w2.png */
    .banner-img-top {
      position: absolute;
      width: 130%;
      left: 30%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;

      opacity: 0;
      animation: fadeTop 1.2s ease forwards;
    }

    /*  淡入動畫 */
    @keyframes fadeTop {
      from { opacity: 0; transform: translate(-50%, -55%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    @keyframes fadeBottom {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    @keyframes fadeExtra {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /*  手機版：舊圖置中 */
    @media (max-width: 900px) {

      .banner {
        height: 65vh;
      }

      /* 最上層：舊圖置中 */
      .banner-img-top {
        width: 200%;
        left: 10%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      /* 中層 new.png */
      .banner-img-bottom {
        width: 130%;
        left: 55%;
        top: 75%;
        transform: translate(-50%, -50%);
      }

      /* 最底層最新圖 extra.png */
      .banner-img-extra {
        width: 260%;
        left: 55%;
        top: 85%;
        transform: translate(-50%, -50%);
      }
    }

    /*  內容區 */
    .page {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .hero {
      text-align: center;
      padding: 40px 0;
    }

    .hero-actions {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s ease;
    }

    .button-primary {
      background: #3b82f6;
      color: white;
    }

    .button-secondary {
      border: 2px solid #3b82f6;
      color: #3b82f6;
    }

    /*  幻燈片 */
    .slideshow-container {
      max-width: 900px;
      margin: 30px auto 0 auto;
      position: relative;
    }

    .slide {
      display: none;
    }

    .slide img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 16px;
    }

    .dots {
      text-align: center;
      margin-top: 12px;
    }

    .dot {
      height: 12px;
      width: 12px;
      margin: 0 4px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
    }

    .active-dot {
      background-color: #333;
    }

    .panel {
      background: #f3f6fa;
      padding: 32px;
      border-radius: 20px;
      margin-top: 40px;
    }

    .grid-2 {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-top: 40px;
    }

    .card {
      background: #f3f6fa;
      padding: 24px;
      border-radius: 20px;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>

  <!--  Banner：三張圖 -->
  <div class="banner">
    <img class="banner-img-extra" src="extra.png">
    <img class="banner-img-bottom" src="new.png">
    <img class="banner-img-top" src="w2.png">
  </div>

  <div class="page">

    <!-- Hero -->
    <section class="hero">
      <h2>野菇軍艦呢<br>總之就是畫原創東西的社團<br>漫畫、插畫、動畫<br>反正就是想畫的都畫</h2>
      <p>我不知道要寫甚麼</p>

      <div class="hero-actions">
        <a class="button button-primary" href="#about">關於我們</a>
        <a class="button button-secondary" href="#members">成員介紹</a>
      </div>
    </section>

    <!-- 幻燈片 -->
    <div class="slideshow-container">
      <div class="slide"><img src="00.jpg"></div>
      <div class="slide"><img src="01.jpg"></div>
      <div class="slide"><img src="02.jpg"></div>
      <div class="slide"><img src="03.jpg"></div>

      <div class="dots">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>

      </div>
    </div>

    <!-- About -->
    <section id="about" class="panel">
      <h3>關於野菇軍艦</h3>
      <p>野菇軍艦是甚麼東東</p>
    </section>

    <!-- Members -->
    <section id="members" class="grid-2">
      <div class="card">
        <h4>艦長 蒼原</h4>
        <p>畫漫畫、插畫，想把腦袋裡的東西全部畫出來。</p>
        <p>短篇漫畫《夜晚的泳池深不見底》、《和頭上有發光披薩圈圈的女孩子當朋友的十個方法》。</p>
        <p>
          <a href="https://www.facebook.com/cang.yuan.384851/?locale=zh_TW" target="_blank">Facebook</a> |
          <a href="https://x.com/__yaoki__" target="_blank">X（Twitter）</a>
        </p>
      </div>

      <div class="card">
        <h4>大副 時鐘</h4>
        <p>插畫、動畫學習中，喜歡少女歌劇。</p>
        <p>短篇漫畫《魚》。</p>
        <p>
          <a href="https://www.facebook.com/shi.zhong.394980?locale=zh_TW" target="_blank">Facebook</a> |
          <a href="https://x.com/clock_owo_" target="_blank">X（Twitter）</a>
        </p>
      </div>
    </section>

    <!-- Contact -->
    <section class="panel">
      <h3>聯絡方式</h3>
      <p>Email：kinokoship@gmail.com</p>
      <p>
        Facebook粉專：
        <a href="https://www.facebook.com/profile.php?id=61583036337568" target="_blank">
          野菇軍艦 
        </a>
      </p>
    </section>

    <footer>
      <p>野菇軍艦 | 原創社團</p>
    </footer>

  </div>

  <!--  幻燈片 JS -->
  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function currentSlide(n) {
      showSlides(slideIndex = n);
    }

    setInterval(() => {
      showSlides(slideIndex += 1);
    }, 3000);

    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("slide");
      let dots = document.getElementsByClassName("dot");

      if (n > slides.length) { slideIndex = 1 }
      if (n < 1) { slideIndex = slides.length }

      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }

      for (i = 0; i < dots.length; i++) {
        dots[i].classList.remove("active-dot");
      }

      slides[slideIndex - 1].style.display = "block";
      dots[slideIndex - 1].classList.add("active-dot");
    }
  </script>

  <!--  視差滑動（3 張圖一起動） -->
  <script>
    window.addEventListener("scroll", function() {
      const topImg = document.querySelector(".banner-img-top");
      const middleImg = document.querySelector(".banner-img-bottom");
      const extraImg = document.querySelector(".banner-img-extra");
      const scrollY = window.scrollY;

      topImg.style.transform =
        `translate(-50%, calc(-50% + ${scrollY * 0.15}px))`;

      middleImg.style.transform =
        `translate(-50%, calc(-50% + ${scrollY * 0.20}px))`;

      extraImg.style.transform =
        `translate(-50%, calc(-50% + ${scrollY * 0.25}px))`;
    });
  </script>

</body>
</html>
